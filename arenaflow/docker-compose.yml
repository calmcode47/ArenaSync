version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arenaflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arenaflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arenaflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: arenaflow_api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override the DATABASE_URL to target the docker postgres bridged container instead of localhost
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/arenaflow
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: arenaflow_worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/arenaflow
    command: python -m arq app.worker.tasks.WorkerSettings
    restart: unless-stopped

volumes:
  postgres_data:
