name: ArenaFlow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt --break-system-packages

      - name: Ruff lint
        run: ruff check backend/app/ --select E,W,F,I --ignore E501

      - name: Black check
        run: black --check backend/app/

      - name: Mypy analysis
        run: mypy backend/app/ --ignore-missing-imports --no-strict-optional

  backend-tests:
    runs-on: ubuntu-latest
    needs: backend-quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: arenaflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt --break-system-packages

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/arenaflow_test
          UPSTASH_REDIS_REST_URL: "test_placeholder"
          UPSTASH_REDIS_REST_TOKEN: "test_placeholder"
          FIREBASE_PROJECT_ID: "test_placeholder"
          FIREBASE_PRIVATE_KEY: "test_placeholder"
          FIREBASE_CLIENT_EMAIL: "test_placeholder"
          GOOGLE_MAPS_API_KEY: "test_placeholder"
        run: |
          cd backend
          alembic upgrade head
          pytest tests/ -v --tb=short --asyncio-mode=auto

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/.pytest_cache/

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Check build output size
        run: |
          SIZE_STR=$(du -sh frontend/dist | awk '{print $1}')
          echo "Frontend build size: $SIZE_STR"
          
          # Strictly fail if > 20MB (20971520 bytes)
          SIZE_BYTES=$(du -sb frontend/dist | awk '{print $1}')
          if [ $SIZE_BYTES -gt 20971520 ]; then
            echo "ERROR: Build size exceeds 20MB limit"
            exit 1
          elif [ $SIZE_BYTES -gt 5242880 ]; then
            echo "WARNING: Build size exceeds 5MB optimal limit"
          fi

  repo-size-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check repo size
        run: |
          SIZE=$(du -sb . --exclude=.git | awk '{print $1}')
          if [ $SIZE -gt 1048576 ]; then
            echo "ERROR: Repo size ${SIZE} bytes exceeds 1MB limit"
            exit 1
          fi
          echo "Repo size: ${SIZE} bytes — OK"

  deploy-backend:
    name: Deploy to Cloud Run
    needs: [backend-quality, backend-tests, frontend-build, repo-size-check]
    runs-on: ubuntu-latest
    # Only deploy on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation (alternative to SA key)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/backend:${{ github.sha }}"
          docker build -f Dockerfile.backend -t "$IMAGE" -t "${IMAGE%:*}:latest" .
          docker push --all-tags "${IMAGE%:*}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: |
            --min-instances=0
            --max-instances=3
            --memory=1Gi
            --cpu=1
            --timeout=300
            --concurrency=80
            --allow-unauthenticated
            --port=8000

      - name: Verify deployment health
        run: |
          sleep 15  # Wait for Cloud Run to finish rolling out
          URL=$(gcloud run services describe ${{ vars.CLOUD_RUN_SERVICE }} \
            --region=${{ vars.GCP_REGION }} \
            --format="value(status.url)")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment healthy: $URL"
            echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
          else
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi

      - name: Post deployment summary
        if: success()
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ vars.CLOUD_RUN_SERVICE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ vars.GCP_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ env.DEPLOY_URL }} |" >> $GITHUB_STEP_SUMMARY
