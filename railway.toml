# railway.toml — Railway deployment configuration
# Place this file at the ROOT of the repository

[build]
builder = "dockerfile"
dockerfilePath = "arenaflow/backend/Dockerfile.backend"

[deploy]
startCommand = "sh -c 'cd /app && python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
